<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ORBIT 操作與介面手冊</title>
<meta name="description" content="ORBIT 13 個核心模組操作與介面手冊——教育訓練用書本體驗">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&family=Noto+Sans+TC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #d8d2c0;
    --desk: #cec6ae;
    --page: #faf7ee;
    --page-2: #f2ede1;
    --spine: rgba(23,20,15,0.16);
    --border: rgba(23,21,18,0.14);
    --border-soft: rgba(23,21,18,0.08);
    --ink: #1c1811;
    --ink-soft: rgba(28,24,17,0.68);
    --ink-faint: rgba(28,24,17,0.44);
    --gold: #96733a;
    --gold-ink: #6d5023;
    --gold-08: rgba(150,115,58,0.09);
    --gold-16: rgba(150,115,58,0.17);
    --hl: rgba(214,168,64,0.38);
    --hl-edge: #c99a3a;
    --shadow: rgba(20,16,8,0.28);
    --serif: 'Noto Serif TC', 'Georgia', serif;
    --tc: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg: #0b0a08;
      --desk: #100e0a;
      --page: #18150f;
      --page-2: #1e1a13;
      --spine: rgba(0,0,0,0.5);
      --border: rgba(232,220,190,0.12);
      --border-soft: rgba(232,220,190,0.07);
      --ink: #ece5d4;
      --ink-soft: rgba(236,229,212,0.68);
      --ink-faint: rgba(236,229,212,0.42);
      --gold: #cda765;
      --gold-ink: #e6c98a;
      --gold-08: rgba(205,167,101,0.10);
      --gold-16: rgba(205,167,101,0.18);
      --hl: rgba(205,167,101,0.24);
      --hl-edge: #cda765;
      --shadow: rgba(0,0,0,0.55);
    }
  }
  :root[data-theme="dark"]{
    --bg: #0b0a08; --desk: #100e0a; --page: #18150f; --page-2: #1e1a13; --spine: rgba(0,0,0,0.5);
    --border: rgba(232,220,190,0.12); --border-soft: rgba(232,220,190,0.07);
    --ink: #ece5d4; --ink-soft: rgba(236,229,212,0.68); --ink-faint: rgba(236,229,212,0.42);
    --gold: #cda765; --gold-ink: #e6c98a; --gold-08: rgba(205,167,101,0.10); --gold-16: rgba(205,167,101,0.18);
    --hl: rgba(205,167,101,0.24); --hl-edge: #cda765; --shadow: rgba(0,0,0,0.55);
  }
  :root[data-theme="light"]{
    --bg: #d8d2c0; --desk: #cec6ae; --page: #faf7ee; --page-2: #f2ede1; --spine: rgba(23,20,15,0.16);
    --border: rgba(23,21,18,0.14); --border-soft: rgba(23,21,18,0.08);
    --ink: #1c1811; --ink-soft: rgba(28,24,17,0.68); --ink-faint: rgba(28,24,17,0.44);
    --gold: #96733a; --gold-ink: #6d5023; --gold-08: rgba(150,115,58,0.09); --gold-16: rgba(150,115,58,0.17);
    --hl: rgba(214,168,64,0.38); --hl-edge: #c99a3a; --shadow: rgba(20,16,8,0.28);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--ink); overflow:hidden;
    font-family:var(--tc);
    background-image:
      radial-gradient(ellipse 70% 50% at 50% -10%, var(--gold-08) 0%, transparent 60%),
      repeating-linear-gradient(115deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 1px, transparent 1px, transparent 3px);
  }
  a{color:inherit;}
  button{font:inherit; color:inherit;}
  ::selection{background:var(--hl);}

  /* ================= STAGE / BOOK ================= */
  .stage{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    perspective:2200px; padding:min(6vh,56px) 20px;
  }
  .book{
    position:relative; width:min(760px, 92vw); height:min(84vh, 900px);
    filter:drop-shadow(0 30px 50px var(--shadow));
  }
  .leaf{
    position:absolute; inset:0; background:var(--page);
    border:1px solid var(--border); border-radius:3px 10px 10px 3px;
    display:flex; flex-direction:column; overflow:hidden;
    transform-origin:left center; backface-visibility:hidden;
    transition:transform .46s cubic-bezier(.5,0,.25,1), opacity .4s ease;
    background-image:linear-gradient(90deg, var(--spine) 0, transparent 22px), linear-gradient(180deg, var(--page-2), var(--page) 90px);
  }
  .leaf.turn-next-out{ transform:rotateY(-114deg); opacity:.15; }
  .leaf.turn-prev-out{ transform-origin:right center; transform:rotateY(114deg); opacity:.15; }
  .leaf.enter-from-next{ transform-origin:right center; transform:rotateY(114deg); opacity:0; }
  .leaf.enter-from-prev{ transform-origin:left center; transform:rotateY(-114deg); opacity:0; }
  .leaf.settled{ transform:rotateY(0deg); opacity:1; }

  .page-scroll{ flex:1; overflow-y:auto; padding:46px 52px 30px; }
  @media (max-width:640px){ .page-scroll{ padding:34px 22px 22px; } }
  .page-scroll::-webkit-scrollbar{width:5px;}
  .page-scroll::-webkit-scrollbar-thumb{background:var(--gold-16); border-radius:99px;}

  .running-head{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 52px; border-bottom:1px solid var(--border-soft); flex:none;
    font-family:var(--sans); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint);
  }
  @media (max-width:640px){ .running-head{ padding:12px 22px; } }
  .running-head b{ color:var(--gold-ink); font-weight:700; }

  .page-foot{
    display:flex; align-items:center; justify-content:center; gap:14px;
    padding:12px 20px; border-top:1px solid var(--border-soft); flex:none;
    font-family:var(--sans); font-size:11px; color:var(--ink-faint); font-variant-numeric:tabular-nums;
  }
  .page-foot .rail{ width:120px; height:2px; background:var(--border); border-radius:99px; position:relative; overflow:hidden; }
  .page-foot .rail i{ position:absolute; inset:0; width:var(--pct,0%); background:var(--gold); }

  /* ================= NAV CHROME ================= */
  .edge-tap{ position:fixed; top:0; bottom:0; width:9vw; max-width:120px; z-index:5; cursor:pointer; background:transparent; border:none; }
  .edge-tap.l{ left:0; } .edge-tap.r{ right:0; }
  .edge-tap:hover{ background:linear-gradient(90deg, var(--gold-08), transparent); }
  .edge-tap.r:hover{ background:linear-gradient(270deg, var(--gold-08), transparent); }

  .chrome{ position:fixed; z-index:10; display:flex; align-items:center; gap:8px; }
  .chrome.tl{ top:18px; left:18px; }
  .chrome.tr{ top:18px; right:18px; }
  .ic-btn{
    display:flex; align-items:center; justify-content:center; gap:6px;
    height:36px; padding:0 13px; border-radius:99px; border:1px solid var(--border);
    background:var(--page); color:var(--ink-soft); cursor:pointer;
    font-family:var(--sans); font-size:12px; transition:.15s;
  }
  .ic-btn:hover{ color:var(--gold-ink); border-color:var(--gold-16); }
  .ic-btn svg{ width:14px; height:14px; flex:none; }

  /* ================= COVER ================= */
  .cover{ height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; position:relative; }
  .cover-mark{ font-family:var(--sans); font-size:11px; letter-spacing:.32em; text-transform:uppercase; color:var(--ink-faint); }
  .cover-orbit{ position:relative; width:88px; height:88px; margin:26px 0 20px; }
  .cover-orbit .core{ position:absolute; inset:30px; border-radius:50%; background:var(--gold); box-shadow:0 0 24px var(--gold-16); }
  .cover-orbit .ring{ position:absolute; inset:0; border:1px solid var(--gold-16); border-radius:50%; }
  .cover-orbit .sat{ position:absolute; inset:0; animation:spin 9s linear infinite; }
  .cover-orbit .sat i{ position:absolute; top:0; left:50%; width:6px; height:6px; margin-left:-3px; background:var(--gold); border-radius:50%; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @media (prefers-reduced-motion:reduce){ .cover-orbit .sat{ animation:none; } }
  .cover h1{ font-family:var(--serif); font-weight:900; font-size:clamp(42px,9vw,68px); margin:0; letter-spacing:.02em; text-wrap:balance; }
  .cover .sub{ font-family:var(--serif); font-size:clamp(16px,2.6vw,20px); color:var(--ink-soft); margin:10px 0 0; }
  .cover .ed{ margin-top:28px; font-family:var(--sans); font-size:11.5px; letter-spacing:.08em; color:var(--ink-faint); }
  .cover .open-btn{
    margin-top:40px; display:inline-flex; align-items:center; gap:10px; cursor:pointer;
    padding:13px 30px; border-radius:99px; border:1px solid var(--gold-16); background:var(--gold-08);
    font-family:var(--tc); font-size:14px; font-weight:600; color:var(--gold-ink); transition:.18s;
  }
  .cover .open-btn:hover{ background:var(--gold-16); transform:translateY(-1px); }

  /* ================= FOREWORD / TOC / GENERIC ================= */
  .lead-eyebrow{ font-family:var(--sans); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--gold-ink); margin:0 0 14px; }
  .lead-h{ font-family:var(--serif); font-size:clamp(26px,4vw,32px); font-weight:700; margin:0 0 22px; text-wrap:balance; }
  .prose p{ font-family:var(--tc); font-size:15px; line-height:2; color:var(--ink-soft); margin:0 0 16px; max-width:56ch; }
  .prose .sign{ margin-top:26px; font-family:var(--serif); font-size:14px; color:var(--ink-faint); font-style:italic; }

  .toc-list{ list-style:none; margin:0; padding:0; }
  .toc-list li + li{ border-top:1px solid var(--border-soft); }
  .toc-list a{
    display:flex; align-items:baseline; gap:10px; padding:13px 2px; text-decoration:none; color:var(--ink-soft);
  }
  .toc-list a:hover{ color:var(--gold-ink); }
  .toc-num{ font-family:var(--sans); font-variant-numeric:tabular-nums; font-size:12px; color:var(--gold); width:20px; flex:none; }
  .toc-name{ font-family:var(--tc); font-weight:600; color:var(--ink); white-space:nowrap; }
  .toc-sub{ font-family:var(--tc); font-size:12px; color:var(--ink-faint); white-space:nowrap; }
  .toc-dots{ flex:1; border-bottom:1px dotted var(--border); transform:translateY(-4px); min-width:16px; }
  .toc-pg{ font-family:var(--sans); font-variant-numeric:tabular-nums; font-size:12px; color:var(--ink-faint); flex:none; }

  /* ================= CHAPTER ================= */
  .ch-head{ margin-bottom:24px; }
  .ch-num{ font-family:var(--serif); font-size:13px; color:var(--gold); letter-spacing:.1em; }
  .ch-title{ font-family:var(--serif); font-size:clamp(24px,4vw,30px); font-weight:700; margin:6px 0 8px; text-wrap:balance; }
  .ch-purpose{ font-family:var(--serif); font-style:italic; font-size:14.5px; color:var(--ink-soft); max-width:52ch; line-height:1.7; }

  .sec-h{ font-family:var(--sans); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); margin:26px 0 12px; }
  .sec-h:first-of-type{ margin-top:8px; }

  .steps{ list-style:none; margin:0; padding:0; counter-reset:st; display:flex; flex-direction:column; gap:9px; }
  .steps li{ counter-increment:st; display:flex; gap:11px; }
  .steps li .n{ font-family:var(--sans); font-variant-numeric:tabular-nums; font-size:11px; font-weight:700; color:var(--gold); background:var(--gold-16); width:19px; height:19px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex:none; margin-top:2px; }
  .steps li .n::before{ content:counter(st); }

  .bullets{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:9px; }
  .bullets li{ display:flex; gap:10px; }
  .bullets li .d{ width:4px; height:4px; border-radius:50%; background:var(--ink-faint); flex:none; margin-top:9px; }

  .hl-t{ display:block; font-size:14px; line-height:1.85; color:var(--ink-soft); cursor:pointer; border-radius:3px; padding:1px 4px; margin:-1px -4px; position:relative; transition:background .15s; }
  .hl-t:hover{ background:var(--gold-08); }
  .hl-t strong{ color:var(--ink); font-weight:600; }
  .hl-t.hl{ background:var(--hl); box-shadow:inset 3px 0 0 var(--hl-edge); }
  .hl-t.hl:hover{ background:var(--hl); }

  .hint{
    display:inline-flex; align-items:center; gap:7px; margin:0 0 22px; padding:7px 12px; border-radius:99px;
    background:var(--gold-08); border:1px solid var(--border-soft); font-family:var(--sans); font-size:11.5px; color:var(--gold-ink);
  }

  .doc-foot-note{ margin-top:34px; padding-top:18px; border-top:1px solid var(--border-soft); font-family:var(--sans); font-size:11.5px; color:var(--ink-faint); }

  /* ================= CLOSING ================= */
  .closing{ min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:28px 36px; gap:12px; }
  .closing .line{ font-family:var(--serif); font-size:clamp(17px,2.6vw,21px); color:var(--ink); line-height:1.7; max-width:46ch; text-wrap:balance; margin:0; }
  .closing .line.soft{ color:var(--ink-soft); font-size:clamp(14px,2vw,16px); }
  .closing .rule{ width:36px; height:1px; background:var(--gold-16); margin:4px 0; }
  .closing .brand{ margin-top:18px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; }
  .closing .brand-item{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px; }
  .closing .brand-item img{ display:block; object-fit:contain; }
  .closing .brand-item.co-mark img{ width:min(360px,82vw); height:auto; max-height:96px; opacity:1; }
  .closing .brand-item.line-mark img{ width:190px; height:auto; object-fit:contain; border-radius:0; box-shadow:none; background:transparent; }
  .closing .brand-item span{ font-family:var(--tc); font-size:12px; font-weight:600; letter-spacing:.04em; color:var(--ink-soft); }
  .closing .co{ margin-top:10px; font-family:var(--sans); font-size:10px; color:var(--ink-faint); line-height:1.7; max-width:520px; }
</style>
</head>
<body>

<div class="stage"><div class="book" id="book">
  <div class="leaf settled" id="leaf"></div>
</div></div>

<button type="button" class="edge-tap l" id="tapPrev" aria-label="上一頁"></button>
<button type="button" class="edge-tap r" id="tapNext" aria-label="下一頁"></button>

<div class="chrome tl">
  <button type="button" class="ic-btn" id="btnCover" title="封面">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 10.5 12 4l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
  </button>
  <button type="button" class="ic-btn" id="btnToc" title="目錄">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h16M4 12h16M4 18h10"/></svg>目錄
  </button>
</div>
<div class="chrome tr">
  <button type="button" class="ic-btn" id="btnPrev" title="上一頁">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 6l-6 6 6 6"/></svg>
  </button>
  <button type="button" class="ic-btn" id="btnNext" title="下一頁">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 6l6 6-6 6"/></svg>
  </button>
</div>

<script>
(function(){
  "use strict";

  var MODS = [
    { tag:"ORBIT POS", name:"智慧收銀", purpose:"每一筆買賣的收銀台——選品、加購、改價、結帳、開發票，一頁完成。",
      steps:["依分類點選商品加入購物車，或直接掃描條碼快速加入",
             "購物車項目右滑可加備註／客製選項，左滑可刪除；多件商品可「拆開」讓每件套用不同選項",
             "需要招待或折扣時，點「招待」或「套用折扣」，輸入主管授權碼後生效",
             "餐飲業：先選桌位與人數，「滑動送單」出餐；用餐完成後「滑動結帳」",
             "其他業別：選擇付款方式（現金／卡片／電子支付）後滑動結帳",
             "結帳時可選收據、二聯／三聯發票或手機條碼載具（可掃碼輸入）",
             "開啟「電話訂餐」開關可登記電話訂單的聯絡電話與取餐時間"],
      bullets:["左側：商品格狀選單（分類頁籤＋搜尋＋條碼掃描）","右側：購物車面板（品項、數量增減、小計）","服務生角色只看得到「送單」，看不到收款功能，避免誤觸金流"] },
    { tag:"ORBIT QR SHOP", name:"掃碼商務", purpose:"客人手機掃碼看菜單、自己下單，不用登入、不用下載 App。",
      steps:["到「設定 → QR code 線上點餐」產生專屬 QR code，下載後印在桌牌或菜單上",
             "客人掃碼進入歡迎頁（可選擇加 LINE 好友）",
             "點「開始點餐」瀏覽分類商品、加入購物車",
             "填寫姓名與電話，選「立即取餐（15分鐘）」或預約時間",
             "送出後系統給訂單號碼，提示「請至櫃檯結帳取餐」",
             "店內「訂單管理」會跳出新訂單通知，可設定自動列印出單"],
      bullets:["客人端：全螢幕點餐頁（分類頁籤、浮動購物車按鈕、下單表單）","店家端：訂單清單以「線上」標籤標示這類訂單","另有獨立的「候位掃碼」系統，客人掃碼排隊、輪到時手機收到通知"] },
    { tag:"ORBIT ERP", name:"資源規劃", purpose:"庫存、採購單、財務報表的核心後台。",
      bulletsA:["<strong>庫存</strong>——「新增商品」建檔（含規格／客製選項），庫存不足會有缺貨提示；「庫存調整」記錄進貨／出貨／盤點差異；支援 CSV 匯出匯入",
             "<strong>採購</strong>——先建立供應商，「新增採購單」選供應商與品項，狀態從草稿一路推進到已到貨",
             "<strong>財務總覽</strong>——選月份看營收／毛利／預估稅額／淨利，並有「ORBIT AI 財務顧問」可直接問數字",
             "<strong>稅務中心</strong>——查看銷項／進項稅額與可扣抵成本分類（僅供估算參考）",
             "<strong>SaaS／金流中心</strong>——目前為報表頁面，資料需後台手動建立才會顯示"],
      bullets:["庫存頁：商品表格＋快速篩選（全部／缺貨／停用）","採購頁：供應商清單＋採購單清單雙欄式","財務頁：頂部 4 張 KPI 卡＋圖表＋內嵌 AI 問答"] },
    { tag:"ORBIT RSVP", name:"預約與候位", purpose:"線上訂位、現場候位、外送單，一次管理。",
      bulletsA:["<strong>訂位</strong>——「新增訂位」登記姓名電話時間人數，狀態從待確認推進到已完成",
             "<strong>現場候位</strong>（適合咖啡廳等業別）——登記到店客人姓名電話人數，狀態候位中→已叫號→已入座",
             "<strong>桌位管理</strong>——先跑「桌位設定」精靈設好分區與桌數，之後可看即時桌況（空桌／用餐中／結帳中），空桌按「叫號」直接推播下一組候位客人",
             "<strong>外送</strong>——管理 Foodpanda／Uber Eats 訂單，接受／拒絕／完成備餐／取餐狀態切換"],
      bullets:["訂位頁：日期切換＋清單","桌位頁：依分區呈現的樓面圖，顏色代表桌況","外送頁：看板式訂單卡片"] },
    { tag:"ORBIT LINE", name:"LINE 整合", purpose:"串接 LINE 官方帳號，讓訂位／候位／訂單通知自動推播給客人。",

             "客戶清單可搜尋，支援 CSV 匯出匯入",

             "「備註」分頁可記錄客戶偏好等資訊"],
      bullets:["清單頁頂部 4 張統計卡（總客戶數／活躍客戶／平均消費／總點數）","詳細頁：等級徽章＋4 張數據卡＋消費紀錄／備註分頁"] },
    { tag:"ORBIT WMS", name:"倉儲管理", purpose:"多倉別、跨倉庫存同步、盤點與調撥，庫存異動即時反映在系統上。",
      bulletsA:["<strong>倉別管理</strong>——依門市或倉庫建立多個倉別，指定其中一個為預設倉，單一門市客戶完全無感、多倉客戶隨時可加開新倉",

      bullets:["總覽頁：各倉庫存卡片＋跨倉低庫存警示彙總","倉別管理頁：新增／編輯／指定預設倉，操作方式比照商品管理","盤點頁：選倉開始或繼續盤點，逐商品輸入實際數量，結束後即時看到差異報表"] },

      steps:["進入 AI 頁面，可直接點選建議提問（本月熱銷／三個月趨勢／低庫存提醒／月增減）或自行輸入問題",
             "送出後 AI 以文字＋表格回覆",

      bullets:["單頁式對話框，類似聊天視窗","依方案提供對應 AI 使用額度，用量與剩餘額度可隨時查詢"] },
    { tag:"ORBIT PMS", name:"旅宿管理", purpose:"房態總覽、訂房、清潔、維修、OTA 通路，旅宿業的營運中樞。",
      bulletsA:["<strong>房況看板</strong>——依樓層看房間狀態（空房／入住中／已預訂／待清潔／清潔中／維修中／鎖房），點房間可改狀態或看訂房詳情",
             "<strong>訂房</strong>——「新增訂房」填客人資料、房型房號、日期、訂房來源（官網／OTA 平台／電話／現場）、訂金等",

             "<strong>自助入住</strong>——產生給房客的線上報到連結／PIN 碼",
             "<strong>備品管理</strong>——依類別管理房間備品庫存，低於安全量會提醒",
             "<strong>維修管理</strong>——報修單看板（待處理／維修中／已完成）",
             "<strong>OTA 通路管理</strong>——管理 Booking.com／Agoda／Expedia 等通路開關與抽成比例，可按「同步」"],
      bullets:["主看板為房間格狀圖，顏色代表房況","子功能各自獨立頁面（房務／自助入住／備品／維修／OTA）"] },
    { tag:"ORBIT ESTATE", name:"豪宅管家", purpose:"為高端住宅／建案打造的智慧宅管家——住戶服務、公設預約、包裹代收、智慧宅控。",
      steps:["住戶透過共用帳號登入個人化管家介面",
             "「公設預約」選擇健身房／泳池／宴會廳等公共設施的可用時段並預約",
             "「包裹代收」收到包裹時系統通知住戶，並記錄簽收與取件狀態",
             "「訪客登記」預先登記訪客資訊，門口報到時一鍵查核",
             "「住戶服務」提交報修／客服需求，物業端追蹤處理進度"],
      bullets:["比照 PMS 的看板式設計，以「住戶／單位」取代「房間」作為管理單位","物業端設禮賓服務台，集中處理預約核准、包裹與訪客報到","智慧宅控（門禁／燈光／空調遠端操作）為下一階段規劃項目"] }
  ];

  var TOTAL = 4 + MODS.length; // cover + foreword + toc + modules + closing
  var idx = 0;
  var hlKey = "orbit-guide-hl-v1";
  var posKey = "orbit-guide-pos-v1";
  var hintKey = "orbit-guide-hint-seen";

  function loadHl(){ try{ return new Set(JSON.parse(localStorage.getItem(hlKey)||"[]")); }catch(e){ return new Set(); } }
  function saveHl(set){ try{ localStorage.setItem(hlKey, JSON.stringify(Array.from(set))); }catch(e){} }
  var hlSet = loadHl();

  function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function hlLine(pageId, i, html){
    var id = pageId + ":" + i;
    var on = hlSet.has(id) ? " hl" : "";
    return '<span class="hl-t' + on + '" data-hid="' + id + '">' + html + '</span>';
  }

  function renderModule(m, n){
    var pid = "m" + n;
    var li = 0;
    var opHtml = "";
    if (m.steps){
      opHtml = '<ol class="steps">' + m.steps.map(function(s){
        li++; return '<li><span class="n"></span>' + hlLine(pid, li, esc(s)) + '</li>';
      }).join("") + '</ol>';
    } else if (m.bulletsA){
      opHtml = '<ul class="bullets">' + m.bulletsA.map(function(s){
        li++; return '<li><span class="d"></span>' + hlLine(pid, li, s) + '</li>';
      }).join("") + '</ul>';
    }
    var ifaceHtml = '<ul class="bullets">' + m.bullets.map(function(s){
      li++; return '<li><span class="d"></span>' + hlLine(pid, li, esc(s)) + '</li>';
    }).join("") + '</ul>';

    var hint = "";
    if (n === 1 && !localStorage.getItem(hintKey)){
      hint = '<div class="hint">✦ 點一下任何一行文字，就能畫重點——下次打開還在</div>';
    }

    return '<div class="ch-head"><div class="ch-num">第 ' + String(n).padStart(2,"0") + ' 章 · ' + m.tag + '</div>' +
      '<h1 class="ch-title">' + m.name + '</h1><p class="ch-purpose">' + m.purpose + '</p></div>' +
      hint +
      '<p class="sec-h">怎麼操作</p>' + opHtml +
      '<p class="sec-h">畫面上有什麼</p>' + ifaceHtml;
  }

  function renderPage(i){
    if (i === 0){
      return { head:"封面", body:
        '<div class="cover">' +
          '<div class="cover-mark">OBARAI INTELLIGENCE</div>' +
          '<div class="cover-orbit"><div class="ring"></div><div class="core"></div><div class="sat"><i></i></div></div>' +
          '<h1>ORBIT</h1>' +
          '<p class="sub">操作與介面手冊</p>' +
          '<p class="ed">2026 年版 · 第一版 · 13 個核心模組</p>' +
          '<button type="button" class="open-btn" id="openBtn">翻開手冊<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></button>' +
        '</div>' };
    }
    if (i === 1){
      return { head:"序", body:
        '<p class="lead-eyebrow">序</p><h1 class="lead-h">寫在最前面</h1>' +
        '<div class="prose">' +
        '<p>ORBIT 從來不是一套要你「先讀完手冊才敢動手」的系統。它被設計成上手直覺、操作像喝水呼吸一樣自然——但直覺不代表沒有深度。當店裡忙起來、當有一天你想用得比現在更好，這本手冊就是那個時候該翻開的地方。</p>' +
        '<p>十三個模組，各自獨立又彼此相連：收銀是每天都要用的第一線，庫存與採購是背後的骨幹，會員與預約是留住客人的方式，人事考勤讓管理不再靠記憶，AI 則在你需要判斷時給一個提醒。</p>' +
        '<p>我們把每個模組拆成兩件事——怎麼操作、畫面上有什麼——盡量用最少的字說清楚。讀不完沒關係，先讀跟你最相關的那幾章，其餘的，等用得上的時候再回來翻。</p>' +
        '<p>覺得哪一段對你特別重要，點一下就能畫重點，下次打開手冊時它還在。</p>' +
        '<p class="sign">—— OBARAI INTELLIGENCE</p>' +
        '</div>' };
    }
    if (i === 2){
      var rows = MODS.map(function(m, n0){
        var n = n0 + 1, pg = 3 + n0 + 1;
        return '<li><a href="#" data-goto="' + (n+2) + '">' +
          '<span class="toc-num">' + String(n).padStart(2,"0") + '</span>' +
          '<span class="toc-name">' + m.name + '</span>' +
          '<span class="toc-sub">' + m.tag + '</span>' +
          '<span class="toc-dots"></span>' +
          '<span class="toc-pg">' + pg + '</span></a></li>';
      }).join("");
      return { head:"目錄", body: '<p class="lead-eyebrow">目錄</p><h1 class="lead-h">十三個模組</h1><ul class="toc-list">' + rows + '</ul>' };
    }
    if (i === TOTAL - 1){
      return { head:"後記", body:
        '<div class="closing">' +
          '<p class="line">這或許是你們看過使用說明最少的系統操作手冊吧。</p>' +
          '<div class="rule"></div>' +
          '<p class="line soft">我們認為大部份都可以讓電腦、讓 AI 去執行。</p>' +
          '<p class="line soft">AI 不能幫你過生活，但希望有了 AI，你可以找回更多失去的生活。</p>' +
          '<div class="brand">' +
            '<div class="brand-item co-mark"><img src="/logo-mark.webp" alt="OBARAI INTELLIGENCE"></div>' +
            '<a class="brand-item line-mark" href="https://lin.ee/waBCbW6" target="_blank" rel="noopener noreferrer" aria-label="加入 OBARAI LINE 官方帳號" style="text-decoration:none"><img src="/line-qr.png" alt="加入 OBARAI LINE 官方帳號"><span>加入 OBARAI LINE 官方帳號</span><small style="font-family:var(--tc);font-size:10px;color:var(--ink-faint)">手機點擊開啟 LINE・桌機掃描 QR Code</small></a>' +
          '</div>' +
          '<div class="co">OBARAI INTELLIGENCE Co., Ltd. 鎧洋聲影科技　·　統一編號 61210989　·　電話 03-6129005</div>' +
        '</div>' };
    }
    var n = i - 2;
    var m = MODS[n-1];
    return { head: "第" + String(n).padStart(2,"0") + "章 · " + m.name, body: renderModule(m, n) };
  }

  var leaf = document.getElementById("leaf");

  function applyHlListeners(root){
    root.querySelectorAll(".hl-t").forEach(function(el){
      el.addEventListener("click", function(){
        var id = el.getAttribute("data-hid");
        if (!id) return;
        if (hlSet.has(id)){ hlSet.delete(id); el.classList.remove("hl"); }
        else { hlSet.add(id); el.classList.add("hl"); }
        saveHl(hlSet);
      });
    });
    root.querySelectorAll("[data-goto]").forEach(function(el){
      el.addEventListener("click", function(e){ e.preventDefault(); go(parseInt(el.getAttribute("data-goto"),10)); });
    });
    var openBtn = root.querySelector("#openBtn");
    if (openBtn) openBtn.addEventListener("click", function(){ go(1); });
  }

  function paint(i){
    var p = renderPage(i);
    leaf.innerHTML =
      (i > 0 ? '<div class="running-head"><span>ORBIT 操作與介面手冊</span><b>' + p.head + '</b></div>' : '') +
      '<div class="page-scroll">' + p.body + '</div>' +
      (i > 0 ? '<div class="page-foot"><span>' + (i+1) + ' / ' + TOTAL + '</span><span class="rail" style="--pct:' + Math.round((i)/(TOTAL-1)*100) + '%"><i></i></span></div>' : '');
    applyHlListeners(leaf);
    if (i >= 3 && !localStorage.getItem(hintKey)){
      try{ localStorage.setItem(hintKey, "1"); }catch(e){}
    }
    try{ localStorage.setItem(posKey, String(i)); }catch(e){}
  }

  function go(target, dir){
    target = Math.max(0, Math.min(TOTAL-1, target));
    if (target === idx) return;
    var direction = dir || (target > idx ? "next" : "prev");
    leaf.classList.remove("settled");
    leaf.classList.add(direction === "next" ? "turn-next-out" : "turn-prev-out");
    window.setTimeout(function(){
      idx = target;
      paint(idx);
      leaf.classList.remove("turn-next-out","turn-prev-out");
      leaf.classList.add(direction === "next" ? "enter-from-next" : "enter-from-prev");
      // force reflow so the entering transform is applied before we animate to settled
      void leaf.offsetWidth;
      requestAnimationFrame(function(){
        leaf.classList.remove("enter-from-next","enter-from-prev");
        leaf.classList.add("settled");
      });
    }, 260);
  }

  function next(){ go(idx+1, "next"); }
  function prev(){ go(idx-1, "prev"); }

  document.getElementById("tapNext").addEventListener("click", next);
  document.getElementById("tapPrev").addEventListener("click", prev);
  document.getElementById("btnNext").addEventListener("click", next);
  document.getElementById("btnPrev").addEventListener("click", prev);
  document.getElementById("btnToc").addEventListener("click", function(){ go(2); });
  document.getElementById("btnCover").addEventListener("click", function(){ go(0); });

  document.addEventListener("keydown", function(e){
    if (e.key === "ArrowRight") next();
    else if (e.key === "ArrowLeft") prev();
  });

  var touchX = null, touchY = null;
  document.addEventListener("touchstart", function(e){
    touchX = e.touches[0].clientX; touchY = e.touches[0].clientY;
  }, {passive:true});
  document.addEventListener("touchend", function(e){
    if (touchX === null) return;
    var dx = e.changedTouches[0].clientX - touchX;
    var dy = e.changedTouches[0].clientY - touchY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)){
      if (dx < 0) next(); else prev();
    }
    touchX = null; touchY = null;
  }, {passive:true});

  var resume = 0;
  try{ resume = parseInt(localStorage.getItem(posKey)||"0",10) || 0; }catch(e){}
  idx = Math.max(0, Math.min(TOTAL-1, resume));
  paint(idx);
})();
</script>
